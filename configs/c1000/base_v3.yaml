seed: 42

paths:
  samples: data/processed/samples_subset_c1000.pt
  splits: data/processed/splits_c1000.json
  output_dir: outputs/c1000/base_v3

data:
  knn_k: 32
  batch_size: 256
  num_workers: 16
  eval_num_workers: 4
  prefetch_factor: 1
  eval_prefetch_factor: 1
  persistent_workers: true
  pin_memory: true
  eval_pin_memory: false
  max_nodes_per_batch: 45000
  eval_max_nodes_per_batch: 45000
  length_bucket_size: 256

model_name: base_v2

model:
  esm_dim: 1280
  basic_dim: 57
  edge_dim: 17
  esm_proj_dim: 128
  hidden_dim: 256
  num_layers: 6
  dropout: 0.1
  num_classes: 3

train:
  epochs: 100
  lr: 0.0001
  weight_decay: 0.00001
  patience: 15
  grad_clip: 1.0
  fp16: true
  logging_steps: 100
  save_total_limit: 2

wandb:
  project_name: musrnet_c1000
  run_name: base_v3
  run_id: null  # ab6b9gk0
  resume_same_run: false  # true

loss:
  delta: 1.0
  w_perturbed: 0.5
  w_radius: 0
  start_perturbed_epoch: 0
  start_radius_epoch: 0
  warmup: 0
